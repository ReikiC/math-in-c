project:
  type: book
  output-dir: _site

book:
  title: "Math in C"
  author: "Dankao Chen"
  language: zh
  page-navigation: true
  chapters:
    - index.qmd
    - notebooks/01-demo.ipynb
    - notebooks/02-linear-algebra.ipynb

format:
  html:
    theme: cosmo
    toc: true
    code-fold: false
    page-layout: full
    include-in-header:
      text: |
        <style>
        body {
          font-family: "SimSun", "宋体", "Times New Roman", serif;
        }
        code, pre, .code {
          font-family: "Courier New", monospace;
        }
        </style>
